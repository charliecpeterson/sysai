name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binaries
        run: |
          mkdir -p dist
          echo "Building linux-x64..."
          bun build --compile --minify --target=bun-linux-x64   main.ts --outfile dist/sysai-linux-x64
          echo "Building linux-arm64..."
          bun build --compile --minify --target=bun-linux-arm64 main.ts --outfile dist/sysai-linux-arm64
          echo "Building darwin-x64..."
          bun build --compile --minify --target=bun-darwin-x64  main.ts --outfile dist/sysai-darwin-x64
          echo "Building darwin-arm64..."
          bun build --compile --minify --target=bun-darwin-arm64 main.ts --outfile dist/sysai-darwin-arm64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum sysai-* > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/sysai-linux-x64
            dist/sysai-linux-arm64
            dist/sysai-darwin-x64
            dist/sysai-darwin-arm64
            dist/checksums.txt
